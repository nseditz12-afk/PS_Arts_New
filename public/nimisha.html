<!DOCTYPE html>
<html lang="en">
<head>
    <title>Art & Soul Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        /* LOGIN CARD */
        .login-card {
            max-width: 400px;
            margin: 60px auto;
            padding: 35px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        .input-box{
            margin-bottom:18px;
            text-align:left;
        }

        .input-box label{
            font-size:12px;
            display:block;
            margin-bottom:5px;
            opacity:0.8;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            outline:none;
            background:rgba(255,255,255,0.2);
            color:white;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background: linear-gradient(45deg,#00c6ff,#0072ff);
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{ transform:scale(1.05); }

        /* APP CONTENT */
        .app-content{ display:none; }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }

        .logout-btn{
            padding:8px 15px;
            background:#ff4d4d;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }

        .product {
            display:flex;
            justify-content:space-between;
            margin:10px 0;
        }

        /* LOADING */
        .loader{
            display:none;
            text-align:center;
            margin:10px;
        }

        /* RESPONSIVE */
        @media(max-width:600px){
            .container{ width:95%; }
            .login-card{ margin:30px auto; }
        }

    </style>
</head>

<body>

<div class="container">

<h1>🎨 Art & Soul Studio</h1>

<!-- LOGIN -->
<div class="login-card" id="loginCard">
    <h3>Welcome Back</h3>
    <div class="input-box">
        <label>Email</label>
        <input id="email" placeholder="Enter email">
    </div>
    <div class="input-box">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">
    </div>
    <button class="btn" onclick="login()">Login</button>
</div>

<!-- LOADER -->
<div class="loader" id="loader">Loading...</div>

<!-- APP -->
<div class="app-content" id="appContent">

<div class="top-bar">
    <h2>Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="card">
    <h3>🎨 Sell Art</h3>
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimage" type="file">
    <button onclick="addProduct()">Upload</button>
</div>

<div class="card">
    <h3>🛒 Products</h3>
    <div id="products"></div>
</div>

<div class="card">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <h4 id="total"></h4>
    <button onclick="checkout()">Checkout</button>
</div>

<div class="card">
    <h3>Orders</h3>
    <div id="orders"></div>
</div>

<div class="card">
    <h3>Dashboard</h3>
    <div id="dashboard"></div>
</div>

</div>
</div>

<script>
const API = "http://localhost:3000/api";
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let TOKEN = localStorage.getItem("token");

// AUTO LOGIN
window.onload = () => {
    if(TOKEN){
        showApp();
    }
};

function showApp(){
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    fetchProducts();
    fetchOrders();
    fetchDashboard();
    showCart();
}

function showLoader(show){
    document.getElementById("loader").style.display = show ? "block" : "none";
}

// LOGIN
async function login(){
    showLoader(true);
    const res = await fetch(API+"/auth/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email.value,password:password.value})
    });

    const data = await res.json();
    TOKEN = data.token;
    localStorage.setItem("token",TOKEN);
    showLoader(false);

    showApp();
}

// LOGOUT
function logout(){
    localStorage.removeItem("token");
    location.reload();
}

// (rest functions unchanged)
async function addProduct(){
    let formData=new FormData();
    formData.append("name",pname.value);
    formData.append("price",pprice.value);
    formData.append("image",pimage.files[0]);

    await fetch(API+"/products/add",{
        method:"POST",
        headers:{"Authorization":"Bearer "+TOKEN},
        body:formData
    });

    fetchProducts();
}

async function fetchProducts(){
    const res=await fetch(API+"/products");
    const data=await res.json();

    products.innerHTML="";
    data.forEach(p=>{
        products.innerHTML+=`<div class='product'><b>${p.name}</b> ₹${p.price}</div>`;
    });
}

function showCart(){
    cartItems.innerHTML="";
    let total=0;
    cart.forEach(c=>{total+=c.price;});
    total.innerText="Total: ₹"+total;
}

async function checkout(){alert("Checkout");}
async function fetchOrders(){}
async function fetchDashboard(){}

</script>

</body>
</html>
